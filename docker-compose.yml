version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: openwrt-monitor:local
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ~/.ssh:/root/.ssh:ro
    environment:
      - OWM_DEBUG=false
      - OWM_COLLECT_INTERVAL_SECONDS=5
      - OWM_SECRET_KEY=please-change-to-a-long-random-string
      - OWM_ADMIN_USERNAME=admin
      - OWM_ADMIN_PASSWORD=please-change-admin-password
      - OWM_HISTORY_RETENTION_DAYS=7
      # 本地开发调试可临时打开；生产环境不要启用。
      # - OWM_AUTH_DISABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # InfluxDB 可选 — 部署后开启历史数据存储
